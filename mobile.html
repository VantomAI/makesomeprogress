<!DOCTYPE html>
<html lang="en">
<head>
  <script>window.FORCE_MOBILE_VIEW = true;</script>
</head>
<body>
  <script>
    // Redirect to index.html which handles mobile view via FORCE_MOBILE_VIEW flag

    // set the localStorage preference and redirect
    localStorage.setItem('preferredBudgetView', 'mobile');
    window.location.href = 'index.html';
  </script>
</body>
</html>
